name: Deploy to Railway

on:
  push:
    branches:
      - main # Thay đổi branch này nếu branch chính của bạn không phải là main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        run: |
          railway service
          railway up --detach --service 4bb2dd9b-f2a3-409c-a276-731cbcd372b6
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

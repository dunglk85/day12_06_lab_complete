events { worker_connections 256; }

http {
    # Docker DNS resolver để tìm agent containers (cần thiết khi scale động)
    resolver 127.0.0.11 valid=10s;

    upstream agent_cluster {
        # Tên service "agent" trong docker-compose sẽ tự trỏ đến các container IPs
        server agent:8000;
        keepalive 16;
    }

    server {
        listen 80;

        # Add instance header để thấy rõ load balancing container nào phục vụ
        add_header X-Served-By $upstream_addr always;

        location / {
            proxy_pass http://agent_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_next_upstream error timeout http_503;
            proxy_next_upstream_tries 3;
        }

        location /health {
            proxy_pass http://agent_cluster/health;
            access_log off;
        }
    }
}
